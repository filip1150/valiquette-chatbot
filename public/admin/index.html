<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Valiquette Mechanical — Admin Panel</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --blue: #1557A0;
    --blue-dark: #0e3d7a;
    --bg: #f8f9fa;
    --sidebar: #1a1a2e;
    --sidebar-text: #c8c8d4;
    --white: #ffffff;
    --border: #e5e7eb;
    --text: #1a1a1a;
    --muted: #6b7280;
    --success: #22c55e;
    --danger: #ef4444;
    --warning: #f59e0b;
  }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  /* Login */
  #login-screen {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
  }
  .login-box {
    background: white;
    border-radius: 16px;
    padding: 48px 40px;
    width: 380px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    text-align: center;
  }
  .login-box .logo { font-size: 48px; margin-bottom: 8px; }
  .login-box h1 { font-size: 22px; font-weight: 700; color: var(--blue); margin-bottom: 4px; }
  .login-box p { color: var(--muted); font-size: 14px; margin-bottom: 32px; }
  .form-group { margin-bottom: 16px; text-align: left; }
  .form-group label { display: block; font-size: 13px; font-weight: 600; color: var(--muted); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
  .form-group input { width: 100%; padding: 12px 16px; border: 1.5px solid var(--border); border-radius: 8px; font-size: 15px; outline: none; transition: border-color 0.15s; }
  .form-group input:focus { border-color: var(--blue); }
  .btn { display: inline-flex; align-items: center; gap: 8px; padding: 11px 20px; border-radius: 8px; border: none; font-size: 14px; font-weight: 600; cursor: pointer; transition: background 0.15s, transform 0.1s; }
  .btn:active { transform: scale(0.97); }
  .btn-primary { background: var(--blue); color: white; }
  .btn-primary:hover { background: var(--blue-dark); }
  .btn-secondary { background: var(--bg); color: var(--text); border: 1.5px solid var(--border); }
  .btn-secondary:hover { background: var(--border); }
  .btn-danger { background: var(--danger); color: white; }
  .btn-danger:hover { background: #dc2626; }
  .btn-sm { padding: 7px 14px; font-size: 13px; }
  .btn-full { width: 100%; justify-content: center; }
  #login-error { color: var(--danger); font-size: 14px; margin-bottom: 16px; display: none; }

  /* App layout */
  #app { display: none; min-height: 100vh; }
  .layout { display: flex; min-height: 100vh; }

  /* Sidebar */
  .sidebar {
    width: 240px;
    background: var(--sidebar);
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
    position: fixed;
    top: 0;
    left: 0;
    height: 100vh;
    z-index: 100;
  }
  .sidebar-logo {
    padding: 24px 20px 20px;
    border-bottom: 1px solid rgba(255,255,255,0.08);
  }
  .sidebar-logo h2 { color: var(--blue); font-size: 16px; font-weight: 700; }
  .sidebar-logo p { color: var(--sidebar-text); font-size: 12px; opacity: 0.7; margin-top: 2px; }
  .sidebar-nav { flex: 1; padding: 12px 0; overflow-y: auto; }
  .nav-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 20px;
    color: var(--sidebar-text);
    cursor: pointer;
    transition: background 0.15s, color 0.15s;
    font-size: 14px;
    border-left: 3px solid transparent;
    position: relative;
  }
  .nav-item:hover { background: rgba(255,255,255,0.06); color: white; }
  .nav-item.active { background: rgba(21,87,160,0.15); color: white; border-left-color: var(--blue); }
  .nav-item .nav-icon { font-size: 18px; width: 20px; text-align: center; }
  .nav-badge {
    margin-left: auto;
    background: var(--danger);
    color: white;
    border-radius: 10px;
    padding: 2px 7px;
    font-size: 11px;
    font-weight: 700;
  }
  .sidebar-footer {
    padding: 16px 20px;
    border-top: 1px solid rgba(255,255,255,0.08);
  }
  .sidebar-footer button {
    background: none;
    border: 1.5px solid rgba(255,255,255,0.15);
    color: var(--sidebar-text);
    padding: 8px 16px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 13px;
    width: 100%;
    transition: background 0.15s;
  }
  .sidebar-footer button:hover { background: rgba(255,255,255,0.08); }

  /* Main content */
  .main { margin-left: 240px; flex: 1; min-height: 100vh; }
  .topbar {
    background: white;
    border-bottom: 1px solid var(--border);
    padding: 0 32px;
    height: 64px;
    display: flex;
    align-items: center;
    position: sticky;
    top: 0;
    z-index: 50;
  }
  .topbar h1 { font-size: 20px; font-weight: 700; }
  .content { padding: 32px; }

  /* Cards */
  .card { background: white; border-radius: 12px; border: 1px solid var(--border); }
  .card-header { padding: 20px 24px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
  .card-header h3 { font-size: 16px; font-weight: 700; }
  .card-body { padding: 24px; }

  /* Stats grid */
  .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 20px; margin-bottom: 32px; }
  .stat-card { background: white; border-radius: 12px; border: 1px solid var(--border); padding: 20px 24px; }
  .stat-card .stat-label { font-size: 12px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }
  .stat-card .stat-value { font-size: 32px; font-weight: 800; color: var(--blue); margin: 8px 0 4px; }
  .stat-card .stat-sub { font-size: 12px; color: var(--muted); }

  /* Table */
  .table-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 14px; }
  th { text-align: left; padding: 12px 16px; font-size: 12px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 1px solid var(--border); background: #fafafa; }
  td { padding: 14px 16px; border-bottom: 1px solid var(--border); vertical-align: top; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: #fafafa; }

  /* Badge */
  .badge { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 12px; font-weight: 600; }
  .badge-new { background: #fef3c7; color: #92400e; }
  .badge-contacted { background: #dbeafe; color: #1e40af; }
  .badge-booked { background: #d1fae5; color: #065f46; }
  .badge-closed { background: #f3f4f6; color: #6b7280; }

  /* KB entries */
  .kb-grid { display: flex; flex-direction: column; gap: 12px; }
  .kb-entry {
    border: 1.5px solid var(--border);
    border-radius: 10px;
    padding: 16px 20px;
    transition: border-color 0.15s;
  }
  .kb-entry:hover { border-color: var(--blue); }
  .kb-entry-header { display: flex; align-items: center; gap: 12px; margin-bottom: 8px; }
  .kb-category { font-size: 11px; font-weight: 700; color: var(--blue); text-transform: uppercase; letter-spacing: 0.5px; background: #eff6ff; padding: 3px 9px; border-radius: 20px; }
  .kb-title { font-weight: 700; font-size: 15px; flex: 1; }
  .kb-content { font-size: 13px; color: var(--muted); line-height: 1.6; }
  .kb-actions { margin-top: 12px; display: flex; gap: 8px; }

  /* Modal */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.5);
    display: flex; align-items: center; justify-content: center;
    z-index: 1000;
    opacity: 0; pointer-events: none; transition: opacity 0.2s;
  }
  .modal-overlay.open { opacity: 1; pointer-events: all; }
  .modal {
    background: white;
    border-radius: 16px;
    width: 560px;
    max-width: calc(100vw - 32px);
    max-height: calc(100vh - 64px);
    overflow-y: auto;
    transform: translateY(20px) scale(0.97);
    transition: transform 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  .modal-overlay.open .modal { transform: translateY(0) scale(1); }
  .modal-header { padding: 24px 24px 0; display: flex; align-items: center; justify-content: space-between; }
  .modal-header h3 { font-size: 18px; font-weight: 700; }
  .modal-close { background: none; border: none; cursor: pointer; font-size: 24px; color: var(--muted); line-height: 1; }
  .modal-body { padding: 20px 24px 24px; }
  .form-row { margin-bottom: 20px; }
  .form-row label { display: block; font-size: 13px; font-weight: 600; color: var(--muted); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
  .form-row input, .form-row select, .form-row textarea {
    width: 100%;
    padding: 10px 14px;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    font-size: 14px;
    outline: none;
    transition: border-color 0.15s;
    font-family: inherit;
  }
  .form-row input:focus, .form-row select:focus, .form-row textarea:focus { border-color: var(--blue); }
  .form-row textarea { resize: vertical; min-height: 120px; }
  .modal-footer { display: flex; justify-content: flex-end; gap: 10px; }

  /* Conversation detail */
  .conv-messages { display: flex; flex-direction: column; gap: 12px; }
  .conv-msg { max-width: 80%; padding: 10px 14px; border-radius: 14px; font-size: 14px; line-height: 1.5; }
  .conv-msg.user { background: var(--blue); color: white; align-self: flex-end; border-bottom-right-radius: 4px; }
  .conv-msg.assistant { background: #f4f4f5; color: #1a1a1a; align-self: flex-start; border-bottom-left-radius: 4px; }
  .conv-msg .conv-msg-time { font-size: 11px; opacity: 0.7; margin-top: 4px; }

  /* Filter bar */
  .filter-bar { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; margin-bottom: 20px; }
  .filter-bar select { padding: 8px 14px; border: 1.5px solid var(--border); border-radius: 8px; font-size: 14px; outline: none; }
  .filter-bar select:focus { border-color: var(--blue); }

  /* Loading */
  .loading { display: flex; align-items: center; justify-content: center; padding: 48px; color: var(--muted); }
  .spinner { width: 28px; height: 28px; border: 3px solid var(--border); border-top-color: var(--blue); border-radius: 50%; animation: spin 0.7s linear infinite; margin-right: 12px; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Empty state */
  .empty { text-align: center; padding: 48px 24px; color: var(--muted); }
  .empty .empty-icon { font-size: 40px; margin-bottom: 12px; }
  .empty p { font-size: 14px; }

  /* AI Instructions editor */
  #instructions-editor {
    width: 100%; min-height: 500px; resize: vertical;
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    font-size: 14px; line-height: 1.75; color: #1a1a1a;
    padding: 20px; border: 1.5px solid #e5e7eb; border-radius: 8px;
    background: #fafafa;
    transition: border-color 0.15s, background 0.15s;
  }
  #instructions-editor:focus { border-color: var(--blue); background: #fff; outline: none; }

  /* Search */
  .search-input { padding: 9px 14px; border: 1.5px solid var(--border); border-radius: 8px; font-size: 14px; outline: none; width: 260px; }
  .search-input:focus { border-color: var(--blue); }

  /* Toast */
  #toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px);
    background: #1a1a1a; color: white;
    padding: 12px 24px; border-radius: 8px;
    font-size: 14px; font-weight: 500;
    transition: transform 0.3s ease, opacity 0.3s;
    z-index: 9999;
    opacity: 0;
  }
  #toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
  #toast.success { background: #16a34a; }
  #toast.error { background: var(--danger); }

  /* Pagination */
  .pagination { display: flex; gap: 8px; align-items: center; justify-content: center; margin-top: 20px; }
  .pagination button { padding: 7px 14px; border: 1.5px solid var(--border); background: white; border-radius: 6px; cursor: pointer; font-size: 13px; }
  .pagination button:disabled { opacity: 0.4; cursor: default; }
  .pagination button.current { background: var(--blue); color: white; border-color: var(--blue); }
  .pagination span { font-size: 13px; color: var(--muted); }

  /* Mobile */
  .hamburger {
    display: none;
    background: none;
    border: none;
    cursor: pointer;
    padding: 4px;
    margin-right: 12px;
    flex-direction: column;
    gap: 5px;
  }
  .hamburger span {
    display: block;
    width: 22px;
    height: 2px;
    background: var(--text);
    border-radius: 2px;
    transition: 0.2s;
  }
  .sidebar-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    z-index: 99;
  }

  @media (max-width: 768px) {
    .hamburger { display: flex; }
    .sidebar {
      transform: translateX(-100%);
      transition: transform 0.25s ease;
    }
    .sidebar.mobile-open { transform: translateX(0); }
    .sidebar-overlay.mobile-open { display: block; }
    .main { margin-left: 0; }
    .topbar { padding: 0 16px; }
    .content { padding: 16px; }
    .stats-grid { grid-template-columns: repeat(2, 1fr); gap: 12px; margin-bottom: 20px; }
    .card-header { padding: 14px 16px; flex-wrap: wrap; gap: 8px; }
    .card-body { padding: 16px; }
    .table-wrap { overflow-x: auto; }
    table { min-width: 500px; }
  }
</style>
</head>
<body>

<!-- Login -->
<div id="login-screen">
  <div class="login-box">
    <div class="logo">🔥</div>
    <h1>Valiquette Mechanical</h1>
    <p>Admin Panel</p>
    <div id="login-error">Invalid username or password</div>
    <div class="form-group">
      <label>Username</label>
      <input type="text" id="login-username" value="admin" autocomplete="username">
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="login-password" placeholder="Password" autocomplete="current-password">
    </div>
    <button class="btn btn-primary btn-full" onclick="doLogin()">Sign In</button>
  </div>
</div>

<!-- App -->
<div id="app">
  <div class="layout">
    <!-- Sidebar -->
    <nav class="sidebar">
      <div class="sidebar-logo">
        <h2>🔧 Valiquette Mechanical</h2>
        <p>Admin Panel</p>
      </div>
      <div class="sidebar-nav">
        <div class="nav-item active" data-section="dashboard" onclick="navigate('dashboard')">
          <span class="nav-icon">📊</span> Dashboard
        </div>
        <div class="nav-item" data-section="knowledge" onclick="navigate('knowledge')">
          <span class="nav-icon">📚</span> Knowledge Base
        </div>
        <div class="nav-item" data-section="instructions" onclick="navigate('instructions')">
          <span class="nav-icon">🤖</span> AI Instructions
        </div>
        <div class="nav-item" data-section="conversations" onclick="navigate('conversations')">
          <span class="nav-icon">💬</span> Conversations
        </div>
        <div class="nav-item" data-section="leads" onclick="navigate('leads')">
          <span class="nav-icon">👤</span> Leads
          <span class="nav-badge" id="leads-badge" style="display:none">0</span>
        </div>
      </div>
      <div class="sidebar-footer">
        <button onclick="doLogout()">Sign Out</button>
      </div>
    </nav>

    <!-- Sidebar overlay for mobile -->
    <div class="sidebar-overlay" id="sidebar-overlay" onclick="closeSidebar()"></div>

    <!-- Main -->
    <div class="main">
      <div class="topbar">
        <button class="hamburger" onclick="openSidebar()" aria-label="Menu">
          <span></span><span></span><span></span>
        </button>
        <h1 id="page-title">Dashboard</h1>
      </div>
      <div class="content" id="main-content">
        <div class="loading"><div class="spinner"></div> Loading...</div>
      </div>
    </div>
  </div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modal-overlay" onclick="closeModalOnOverlay(event)">
  <div class="modal" id="modal">
    <div class="modal-header">
      <h3 id="modal-title">Modal</h3>
      <button class="modal-close" onclick="closeModal()">×</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
  </div>
</div>

<!-- Toast -->
<div id="toast"></div>

<script>
var API = '';  // same origin
var token = localStorage.getItem('vm_token');
var currentSection = 'dashboard';
var currentPage = { conversations: 1, leads: 1 };

// ── Auth ──────────────────────────────────────────────────────────────────────

function doLogin() {
  var u = document.getElementById('login-username').value.trim();
  var p = document.getElementById('login-password').value;
  fetch(API + '/api/admin/login', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ username: u, password: p }),
  })
  .then(function(r) {
    if (!r.ok) throw new Error('bad');
    return r.json();
  })
  .then(function(d) {
    token = d.token;
    localStorage.setItem('vm_token', token);
    showApp();
  })
  .catch(function() {
    document.getElementById('login-error').style.display = 'block';
  });
}

function doLogout() {
  token = null;
  localStorage.removeItem('vm_token');
  document.getElementById('app').style.display = 'none';
  document.getElementById('login-screen').style.display = 'flex';
}

// ── API helpers ───────────────────────────────────────────────────────────────

function api(method, path, body) {
  return fetch(API + path, {
    method: method,
    headers: {
      'Content-Type': 'application/json',
      'Authorization': 'Bearer ' + token,
    },
    body: body ? JSON.stringify(body) : undefined,
  }).then(function(r) {
    if (r.status === 401) { doLogout(); throw new Error('Unauthorized'); }
    if (!r.ok) throw new Error('Request failed');
    return r.json();
  });
}

// ── Navigation ────────────────────────────────────────────────────────────────

function openSidebar() {
  document.querySelector('.sidebar').classList.add('mobile-open');
  document.getElementById('sidebar-overlay').classList.add('mobile-open');
}
function closeSidebar() {
  document.querySelector('.sidebar').classList.remove('mobile-open');
  document.getElementById('sidebar-overlay').classList.remove('mobile-open');
}

function navigate(section) {
  currentSection = section;
  closeSidebar();
  document.querySelectorAll('.nav-item').forEach(function(el) {
    el.classList.toggle('active', el.dataset.section === section);
  });
  var titles = {
    dashboard: 'Dashboard',
    knowledge: 'Knowledge Base',
    instructions: 'AI Instructions',
    conversations: 'Conversations',
    leads: 'Leads',
  };
  document.getElementById('page-title').textContent = titles[section] || section;
  var content = document.getElementById('main-content');
  content.innerHTML = '<div class="loading"><div class="spinner"></div> Loading...</div>';
  if (section === 'dashboard') loadDashboard();
  else if (section === 'knowledge') loadKnowledge();
  else if (section === 'instructions') loadInstructions();
  else if (section === 'conversations') loadConversations(1);
  else if (section === 'leads') loadLeads(1);
}

function showApp() {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  loadUncontactedBadge();
  navigate('dashboard');
}

function loadUncontactedBadge() {
  api('GET', '/api/admin/stats').then(function(d) {
    var badge = document.getElementById('leads-badge');
    if (d.uncontacted_leads > 0) {
      badge.textContent = d.uncontacted_leads;
      badge.style.display = 'inline-block';
    } else {
      badge.style.display = 'none';
    }
  }).catch(function() {});
}

// ── Dashboard ─────────────────────────────────────────────────────────────────

function loadDashboard() {
  api('GET', '/api/admin/stats').then(function(d) {
    var content = document.getElementById('main-content');
    content.innerHTML = [
      '<div class="stats-grid">',
        statCard('💬', 'Total Conversations', d.total_conversations, "Today: " + d.today_conversations),
        statCard('👤', 'Total Leads', d.total_leads, "This week: " + d.this_week_leads),
        statCard('🔔', 'Uncontacted Leads', d.uncontacted_leads, 'Need follow-up'),
        statCard('📚', 'Knowledge Entries', d.knowledge_base_count, 'In knowledge base'),
        statCard('📅', 'This Month Leads', d.this_month_leads, 'Last 30 days'),
        statCard('💬', 'Today Conversations', d.today_conversations, 'Since midnight'),
      '</div>',
      '<div style="display:grid;grid-template-columns:1fr 1fr;gap:20px">',
        '<div class="card">',
          '<div class="card-header"><h3>Quick Actions</h3></div>',
          '<div class="card-body" style="display:flex;flex-direction:column;gap:12px">',
            '<button class="btn btn-primary" onclick="navigate(\'knowledge\')">📚 Manage Knowledge Base</button>',
            '<button class="btn btn-secondary" onclick="navigate(\'instructions\')">🤖 Edit AI Instructions</button>',
            '<button class="btn btn-secondary" onclick="navigate(\'leads\')">👤 View Leads</button>',
            '<button class="btn btn-secondary" onclick="window.open(window.location.origin,\'_blank\')">🔗 Open Chat Demo</button>',
          '</div>',
        '</div>',
        '<div class="card">',
          '<div class="card-header"><h3>Embed Widget</h3></div>',
          '<div class="card-body">',
            '<p style="font-size:13px;color:#6b7280;margin-bottom:12px">Add this to any page to embed the chat widget:</p>',
            '<code style="display:block;background:#f4f4f5;padding:12px;border-radius:8px;font-size:12px;word-break:break-all;">&lt;script src="' + location.origin + '/widget/valiquette-chat.js"&gt;&lt;/script&gt;</code>',
            '<button class="btn btn-sm btn-secondary" style="margin-top:12px" onclick="copyEmbed()">📋 Copy</button>',
          '</div>',
        '</div>',
      '</div>',
    ].join('');
  }).catch(function() {
    document.getElementById('main-content').innerHTML = '<div class="empty"><div class="empty-icon">⚠️</div><p>Failed to load stats.</p></div>';
  });
}

function statCard(icon, label, value, sub) {
  return '<div class="stat-card"><div class="stat-label">' + icon + ' ' + label + '</div><div class="stat-value">' + value + '</div><div class="stat-sub">' + sub + '</div></div>';
}

function copyEmbed() {
  var code = '<script src="' + location.origin + '/widget/valiquette-chat.js"><\/script>';
  navigator.clipboard.writeText(code).then(function() { toast('Copied!', 'success'); });
}

// ── Knowledge Base ────────────────────────────────────────────────────────────

var kbEntries = [];
var kbFilter = '';

function loadKnowledge() {
  api('GET', '/api/admin/knowledge-base').then(function(entries) {
    kbEntries = entries;
    renderKnowledge();
  }).catch(function() {
    document.getElementById('main-content').innerHTML = '<div class="empty"><div class="empty-icon">⚠️</div><p>Failed to load knowledge base.</p></div>';
  });
}

function renderKnowledge() {
  var filtered = kbEntries.filter(function(e) {
    if (!kbFilter) return true;
    var q = kbFilter.toLowerCase();
    return e.title.toLowerCase().includes(q) || e.content.toLowerCase().includes(q) || e.category.toLowerCase().includes(q);
  });

  var categories = {};
  filtered.forEach(function(e) {
    if (!categories[e.category]) categories[e.category] = [];
    categories[e.category].push(e);
  });

  var html = [
    '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:24px">',
      '<div style="display:flex;gap:12px;align-items:center">',
        '<input class="search-input" placeholder="Search entries..." oninput="filterKB(this.value)" value="' + esc(kbFilter) + '">',
        '<span style="font-size:13px;color:#6b7280">' + filtered.length + ' entries</span>',
      '</div>',
      '<div style="display:flex;gap:8px">',
        '<button class="btn btn-secondary" id="sync-btn" onclick="syncKB()">↻ Sync from Pinecone</button>',
        '<button class="btn btn-primary" onclick="openAddEntry()">+ Add Entry</button>',
      '</div>',
    '</div>',
  ];

  if (filtered.length === 0) {
    html.push('<div class="empty"><div class="empty-icon">📭</div><p>No entries found.</p></div>');
  } else {
    Object.keys(categories).sort().forEach(function(cat) {
      html.push('<h3 style="font-size:14px;font-weight:700;color:#6b7280;text-transform:uppercase;letter-spacing:0.5px;margin:24px 0 12px">' + esc(cat) + ' (' + categories[cat].length + ')</h3>');
      html.push('<div class="kb-grid">');
      categories[cat].forEach(function(e) {
        html.push([
          '<div class="kb-entry" id="kb-' + e.id + '">',
            '<div class="kb-entry-header">',
              '<span class="kb-category">' + esc(e.category) + '</span>',
              '<span class="kb-title">' + esc(e.title) + '</span>',
            '</div>',
            '<div class="kb-content">' + esc(e.content) + '</div>',
            '<div class="kb-actions">',
              '<button class="btn btn-sm btn-secondary" onclick="openEditEntry(\'' + e.id + '\')">✏️ Edit</button>',
              '<button class="btn btn-sm btn-danger" onclick="confirmDeleteEntry(\'' + e.id + '\', \'' + e.title.replace(/'/g, "\\'") + '\')">🗑️ Delete</button>',
            '</div>',
          '</div>',
        ].join(''));
      });
      html.push('</div>');
    });
  }

  document.getElementById('main-content').innerHTML = html.join('');

  // Restore focus to search input if it was active before re-render
  var searchInput = document.querySelector('.search-input');
  if (searchInput && kbFilter) {
    searchInput.focus();
    searchInput.setSelectionRange(searchInput.value.length, searchInput.value.length);
  }
}

function syncKB() {
  var btn = document.getElementById('sync-btn');
  if (btn) { btn.textContent = '↻ Syncing...'; btn.disabled = true; }
  api('POST', '/api/admin/knowledge-base/sync')
    .then(function(d) {
      toast('Synced ' + d.synced + ' entries from Pinecone', 'success');
      loadKnowledge();
    })
    .catch(function() {
      toast('Sync failed', 'error');
      if (btn) { btn.textContent = '↻ Sync from Pinecone'; btn.disabled = false; }
    });
}

function filterKB(val) {
  kbFilter = val;
  renderKnowledge();
}

function openAddEntry() {
  document.getElementById('modal-title').textContent = 'Add Knowledge Entry';
  document.getElementById('modal-body').innerHTML = kbForm({}, false);
  openModal();
}

function openEditEntry(id) {
  var entry = kbEntries.find(function(e) { return e.id === id; });
  if (!entry) return;
  document.getElementById('modal-title').textContent = 'Edit Knowledge Entry';
  document.getElementById('modal-body').innerHTML = kbForm(entry, true);
  openModal();
}

function kbForm(entry, isEdit) {
  var categories = ['About','Services','Furnaces','Air Conditioners','Water Heaters','Pricing','FAQ','Heat Pumps','Gas Piping','Gas Fireplaces','Smart Thermostats','Ventilation','Maintenance','Commercial','Emergency Procedures'];
  var allCats = entry.category && categories.indexOf(entry.category) === -1
    ? categories.concat([entry.category])
    : categories;
  var catOptions = allCats.map(function(c) {
    return '<option value="' + esc(c) + '"' + (entry.category === c ? ' selected' : '') + '>' + esc(c) + '</option>';
  }).join('');
  return [
    '<div class="form-row">',
      '<label>Category</label>',
      '<select id="kb-cat"><option value="">Select category...</option>' + catOptions + '</select>',
    '</div>',
    '<div class="form-row">',
      '<label>Title</label>',
      '<input type="text" id="kb-title" value="' + esc(entry.title || '') + '" placeholder="e.g. Furnace Installation Details">',
    '</div>',
    '<div class="form-row">',
      '<label>Content</label>',
      '<textarea id="kb-content" style="min-height:160px">' + esc(entry.content || '') + '</textarea>',
    '</div>',
    '<div class="modal-footer">',
      '<button class="btn btn-secondary" onclick="closeModal()">Cancel</button>',
      '<button class="btn btn-primary" onclick="saveKBEntry(' + (isEdit ? ('\'' + entry.id + '\'') : 'null') + ')">',
        isEdit ? 'Save Changes' : 'Add Entry',
      '</button>',
    '</div>',
  ].join('');
}

function saveKBEntry(id) {
  var category = document.getElementById('kb-cat').value.trim();
  var title = document.getElementById('kb-title').value.trim();
  var content = document.getElementById('kb-content').value.trim();
  if (!category || !title || !content) { toast('Please fill in all fields', 'error'); return; }

  var method = id ? 'PUT' : 'POST';
  var path = id ? '/api/admin/knowledge-base/' + id : '/api/admin/knowledge-base';

  api(method, path, { category: category, title: title, content: content })
    .then(function() {
      closeModal();
      toast(id ? 'Entry updated!' : 'Entry added!', 'success');
      loadKnowledge();
    })
    .catch(function() { toast('Failed to save entry', 'error'); });
}

function confirmDeleteEntry(id, title) {
  document.getElementById('modal-title').textContent = 'Delete Entry?';
  document.getElementById('modal-body').innerHTML = [
    '<p style="margin-bottom:24px">Are you sure you want to delete <strong>' + esc(title) + '</strong>? This will remove it from the knowledge base and Pinecone permanently.</p>',
    '<div class="modal-footer">',
      '<button class="btn btn-secondary" onclick="closeModal()">Cancel</button>',
      '<button class="btn btn-danger" onclick="deleteEntry(\'' + id + '\')">Delete</button>',
    '</div>',
  ].join('');
  openModal();
}

function deleteEntry(id) {
  api('DELETE', '/api/admin/knowledge-base/' + id)
    .then(function() {
      closeModal();
      toast('Entry deleted', 'success');
      loadKnowledge();
    })
    .catch(function() { toast('Failed to delete entry', 'error'); });
}

// ── AI Instructions ───────────────────────────────────────────────────────────

function loadInstructions() {
  api('GET', '/api/admin/instructions').then(function(d) {
    var updatedStr = d.updated_at ? new Date(d.updated_at).toLocaleString() : 'Never saved';
    document.getElementById('main-content').innerHTML = [
      '<div class="card">',
        '<div class="card-header">',
          '<div>',
            '<h3>System Prompt / AI Instructions</h3>',
            '<p style="font-size:12px;color:#6b7280;margin-top:4px">Last updated: ' + updatedStr + '</p>',
          '</div>',
          '<button class="btn btn-primary" onclick="saveInstructions()">💾 Save</button>',
        '</div>',
        '<div class="card-body">',
          '<p style="font-size:13px;color:#6b7280;margin-bottom:16px">This is the system prompt loaded on every chat request. It defines the bot\'s personality, rules, and behavior. Edit carefully — changes take effect immediately.</p>',
          '<textarea id="instructions-editor">' + esc(d.instructions) + '</textarea>',
        '</div>',
      '</div>',
    ].join('');
  }).catch(function() {
    document.getElementById('main-content').innerHTML = '<div class="empty"><div class="empty-icon">⚠️</div><p>Failed to load instructions.</p></div>';
  });
}

function saveInstructions() {
  var text = document.getElementById('instructions-editor').value.trim();
  if (!text) { toast('Instructions cannot be empty', 'error'); return; }
  api('PUT', '/api/admin/instructions', { instructions: text })
    .then(function() { toast('Instructions saved!', 'success'); loadInstructions(); })
    .catch(function() { toast('Failed to save', 'error'); });
}

// ── Conversations ─────────────────────────────────────────────────────────────

function loadConversations(page) {
  currentPage.conversations = page;
  api('GET', '/api/admin/conversations?page=' + page + '&limit=20').then(function(d) {
    var html = [
      '<div class="filter-bar" style="justify-content:flex-end">',
        '<span style="font-size:13px;color:#6b7280">' + d.total + ' total conversations</span>',
      '</div>',
      '<div class="card">',
        '<div class="table-wrap">',
          '<table>',
            '<thead><tr><th>Started</th><th>Preview</th><th>Messages</th><th>Flagged</th><th>Actions</th></tr></thead>',
            '<tbody>',
    ];
    if (d.conversations.length === 0) {
      html.push('<tr><td colspan="5"><div class="empty"><div class="empty-icon">💬</div><p>No conversations yet.</p></div></td></tr>');
    }
    d.conversations.forEach(function(c) {
      html.push([
        '<tr>',
          '<td style="white-space:nowrap;font-size:13px">' + new Date(c.started_at).toLocaleString() + '</td>',
          '<td style="max-width:300px;font-size:13px">' + esc(c.preview || '(empty)') + '</td>',
          '<td>' + c.message_count + '</td>',
          '<td>' + (c.flagged ? '⭐' : '') + '</td>',
          '<td style="white-space:nowrap">',
            '<button class="btn btn-sm btn-secondary" style="margin-right:6px" onclick="viewConversation(\'' + c.id + '\')">View</button>',
            '<button class="btn btn-sm btn-danger" onclick="confirmDeleteConversation(\'' + c.id + '\')">Delete</button>',
          '</td>',
        '</tr>',
      ].join(''));
    });
    html.push('</tbody></table></div></div>');

    var totalPages = Math.ceil(d.total / 20);
    if (totalPages > 1) {
      html.push(pagination(page, totalPages, 'loadConversations'));
    }

    document.getElementById('main-content').innerHTML = html.join('');
  }).catch(function() {
    document.getElementById('main-content').innerHTML = '<div class="empty"><div class="empty-icon">⚠️</div><p>Failed to load conversations.</p></div>';
  });
}

function viewConversation(id) {
  api('GET', '/api/admin/conversations/' + id).then(function(c) {
    var msgsHtml = c.messages.map(function(m) {
      return '<div class="conv-msg ' + m.role + '">' + esc(m.content).replace(/\n/g, '<br>') + '<div class="conv-msg-time">' + new Date(m.timestamp).toLocaleTimeString() + '</div></div>';
    }).join('');

    document.getElementById('modal-title').textContent = 'Conversation';
    document.getElementById('modal-body').innerHTML = [
      '<div style="font-size:12px;color:#6b7280;margin-bottom:16px">',
        'Started: ' + new Date(c.started_at).toLocaleString() + ' · ' + c.message_count + ' messages',
      '</div>',
      '<div class="conv-messages" style="max-height:400px;overflow-y:auto;padding:8px 0">' + (msgsHtml || '<p style="color:#6b7280">Empty conversation</p>') + '</div>',
      '<div class="modal-footer" style="margin-top:16px">',
        '<button class="btn btn-secondary" onclick="toggleFlag(\'' + c.id + '\')">',
          c.flagged ? '⭐ Unflag' : '☆ Flag',
        '</button>',
        '<button class="btn btn-secondary" onclick="closeModal()">Close</button>',
      '</div>',
    ].join('');
    openModal();
  }).catch(function() { toast('Failed to load conversation', 'error'); });
}

function toggleFlag(id) {
  api('PUT', '/api/admin/conversations/' + id + '/flag')
    .then(function() { closeModal(); toast('Updated!', 'success'); loadConversations(currentPage.conversations); })
    .catch(function() { toast('Failed', 'error'); });
}

function confirmDeleteConversation(id) {
  document.getElementById('modal-title').textContent = 'Delete Conversation?';
  document.getElementById('modal-body').innerHTML = [
    '<p style="margin-bottom:24px">Are you sure you want to permanently delete this conversation and all its messages? This cannot be undone.</p>',
    '<div class="modal-footer">',
      '<button class="btn btn-secondary" onclick="closeModal()">Cancel</button>',
      '<button class="btn btn-danger" onclick="deleteConversation(\'' + id + '\')">Delete</button>',
    '</div>',
  ].join('');
  openModal();
}

function deleteConversation(id) {
  api('DELETE', '/api/admin/conversations/' + id)
    .then(function() { closeModal(); toast('Conversation deleted', 'success'); loadConversations(currentPage.conversations); })
    .catch(function() { toast('Failed to delete', 'error'); });
}

// ── Leads ─────────────────────────────────────────────────────────────────────

var leadsStatusFilter = '';

function loadLeads(page) {
  currentPage.leads = page;
  var qs = '?page=' + page + '&limit=20' + (leadsStatusFilter ? '&status=' + leadsStatusFilter : '');
  api('GET', '/api/admin/leads' + qs).then(function(d) {
    var html = [
      '<div class="filter-bar">',
        '<select onchange="filterLeads(this.value)">',
          '<option value="">All Statuses</option>',
          ['new','contacted','booked','closed'].map(function(s) {
            return '<option value="' + s + '"' + (leadsStatusFilter === s ? ' selected' : '') + '>' + s.charAt(0).toUpperCase() + s.slice(1) + '</option>';
          }).join(''),
        '</select>',
        '<span style="font-size:13px;color:#6b7280">' + d.total + ' leads</span>',
      '</div>',
      '<div class="card">',
        '<div class="table-wrap">',
          '<table>',
            '<thead><tr><th>Name</th><th>Phone</th><th>Service</th><th>Status</th><th>Date</th><th>Actions</th></tr></thead>',
            '<tbody>',
    ];
    if (d.leads.length === 0) {
      html.push('<tr><td colspan="6"><div class="empty"><div class="empty-icon">👤</div><p>No leads yet.</p></div></td></tr>');
    }
    d.leads.forEach(function(l) {
      html.push([
        '<tr>',
          '<td><strong>' + esc(l.name) + '</strong>' + (l.email ? '<br><span style="font-size:12px;color:#6b7280">' + esc(l.email) + '</span>' : '') + '</td>',
          '<td><a href="tel:' + esc(l.phone) + '" style="color:var(--blue)">' + esc(l.phone) + '</a></td>',
          '<td style="font-size:13px">' + esc(l.service_needed || '—') + '</td>',
          '<td><span class="badge badge-' + l.status + '">' + l.status + '</span></td>',
          '<td style="font-size:12px;white-space:nowrap">' + new Date(l.created_at).toLocaleDateString() + '</td>',
          '<td>',
            '<select style="padding:5px 8px;border:1.5px solid #e5e7eb;border-radius:6px;font-size:12px" onchange="updateLeadStatus(' + l.id + ', this.value)">',
              ['new','contacted','booked','closed'].map(function(s) {
                return '<option value="' + s + '"' + (l.status === s ? ' selected' : '') + '>' + s + '</option>';
              }).join(''),
            '</select>',
          '</td>',
        '</tr>',
      ].join(''));
    });
    html.push('</tbody></table></div></div>');

    var totalPages = Math.ceil(d.total / 20);
    if (totalPages > 1) html.push(pagination(page, totalPages, 'loadLeads'));

    document.getElementById('main-content').innerHTML = html.join('');
  }).catch(function() {
    document.getElementById('main-content').innerHTML = '<div class="empty"><div class="empty-icon">⚠️</div><p>Failed to load leads.</p></div>';
  });
}

function filterLeads(status) {
  leadsStatusFilter = status;
  loadLeads(1);
}

function updateLeadStatus(id, status) {
  api('PUT', '/api/admin/leads/' + id, { status: status })
    .then(function() { toast('Status updated', 'success'); loadUncontactedBadge(); })
    .catch(function() { toast('Failed to update', 'error'); });
}

// ── UI Helpers ────────────────────────────────────────────────────────────────

function openModal() {
  document.getElementById('modal-overlay').classList.add('open');
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
}

function closeModalOnOverlay(e) {
  if (e.target === document.getElementById('modal-overlay')) closeModal();
}

function pagination(current, total, fn) {
  var html = ['<div class="pagination">'];
  html.push('<button ' + (current <= 1 ? 'disabled' : '') + ' onclick="' + fn + '(' + (current - 1) + ')">← Prev</button>');
  html.push('<span>Page ' + current + ' of ' + total + '</span>');
  html.push('<button ' + (current >= total ? 'disabled' : '') + ' onclick="' + fn + '(' + (current + 1) + ')">Next →</button>');
  html.push('</div>');
  return html.join('');
}

function toast(msg, type) {
  var el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'show ' + (type || '');
  setTimeout(function() { el.className = ''; }, 3000);
}

function esc(str) {
  return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Boot ──────────────────────────────────────────────────────────────────────

document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') closeModal();
});

document.getElementById('login-password').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') doLogin();
});

if (token) {
  showApp();
} else {
  document.getElementById('login-screen').style.display = 'flex';
}
